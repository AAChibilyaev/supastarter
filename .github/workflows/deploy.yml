name: Deploy

on:
    push:
        branches: [main]

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-and-push:
        name: Build and push Docker image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        outputs:
            image_tag: ${{ steps.meta.outputs.tags }}

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=sha,format=long
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy-staging:
        name: Deploy to staging
        runs-on: ubuntu-latest
        needs: [build-and-push]
        environment: staging

        steps:
            - name: Trigger Coolify staging deploy
              run: |
                  curl -sf -X POST "${{ secrets.COOLIFY_DEPLOY_WEBHOOK_STAGING }}" \
                    -H "Content-Type: application/json" \
                    -d '{"imageTag": "${{ github.sha }}"}'

            - name: Wait for staging health check
              run: |
                  for i in $(seq 1 30); do
                    STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${{ secrets.STAGING_URL }}/api/health" || echo "000")
                    if [ "$STATUS" = "200" ]; then
                      echo "Staging is healthy"
                      exit 0
                    fi
                    echo "Attempt $i: got $STATUS, retrying in 10s..."
                    sleep 10
                  done
                  echo "Staging health check failed after 5 minutes"
                  exit 1

            - name: Run smoke tests against staging
              run: |
                  # Basic smoke tests
                  echo "=== Smoke Tests ==="

                  # 1. Health endpoint
                  HEALTH=$(curl -sf "${{ secrets.STAGING_URL }}/api/health")
                  echo "Health: $HEALTH"

                  # 2. Marketing page loads
                  MARKETING=$(curl -s -o /dev/null -w '%{http_code}' "${{ secrets.MARKETING_URL }}")
                  echo "Marketing homepage: $MARKETING"

                  # 3. SaaS login page loads
                  SAAS=$(curl -s -o /dev/null -w '%{http_code}' "${{ secrets.STAGING_URL }}/")
                  echo "SaaS homepage: $SAAS"
                  echo "=== All smoke tests passed ==="

    deploy-production:
        name: Deploy to production
        runs-on: ubuntu-latest
        needs: [deploy-staging]
        environment: production
        if: success()

        steps:
            - name: Trigger Coolify production deploy
              run: |
                  curl -sf -X POST "${{ secrets.COOLIFY_DEPLOY_WEBHOOK_PRODUCTION }}" \
                    -H "Content-Type: application/json" \
                    -d '{"imageTag": "${{ github.sha }}"}'

            - name: Wait for production health check
              run: |
                  for i in $(seq 1 60); do
                    STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${{ secrets.PRODUCTION_URL }}/api/health" || echo "000")
                    if [ "$STATUS" = "200" ]; then
                      echo "Production is healthy"
                      exit 0
                    fi
                    echo "Attempt $i: got $STATUS, retrying in 10s..."
                    sleep 10
                  done
                  echo "Production health check failed after 10 minutes"
                  exit 1
