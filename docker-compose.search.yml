# Standalone Typesense stack for the @repo/search module.
# NOTE: Typesense is already included in docker-compose.yml (main dev stack).
# Use this file only when you want to run Typesense in isolation.
# Start with: docker compose -f docker-compose.search.yml up -d

services:
  typesense:
    image: typesense/typesense:30.2
    container_name: supastarter-typesense
    restart: unless-stopped
    command: >
      --data-dir /data
      --api-key=xyz_change_me_in_production
      --enable-cors
    environment:
      TYPESENSE_DATA_DIR: /data
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8108/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  typesense_data:
