[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "aacsearch"
version = "0.1.0"
description = "Python client for the AACSearch v1 REST API — search, index management, synonyms, curations, and more"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "AACSearch", email = "dev@aacsearch.com" }]
requires-python = ">=3.9"
dependencies = ["httpx>=0.27.0", "pydantic>=2.0.0"]
classifiers = [
	"Development Status :: 3 - Alpha",
	"Intended Audience :: Developers",
	"License :: OSI Approved :: MIT License",
	"Programming Language :: Python :: 3",
	"Programming Language :: Python :: 3.9",
	"Programming Language :: Python :: 3.10",
	"Programming Language :: Python :: 3.11",
	"Programming Language :: Python :: 3.12",
	"Topic :: Internet :: WWW/HTTP",
	"Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://aacsearch.com"
Repository = "https://github.com/aacsearch/aacsearch-python"
Documentation = "https://docs.aacsearch.com"

[tool.setuptools.packages.find]
where = ["src"]
